<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAgro - Manejo Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1> 👨‍🌾Agro Forte e Futuro Sustentável</h1>
            <p>Guia de Defensivos Agrícolas com Preservação Ambiental</p>
        </header>

        <main>
            <div class="form-group">
                <label for="cultura">1. Escolha a Cultura:</label>
                <select id="cultura">
                    <option value="">Selecione...</option>
                    <option value="soja">Soja</option>
                    <option value="milho">Milho</option>
                    <option value="trigo">Trigo</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cenario">2. Qual o desafio atual na lavoura?</label>
                <select id="cenario" disabled>
                    <option value="">Selecione a cultura primeiro...</option>
                </select>
            </div>

            <div id="resultado" class="card hidden">
                </div>
        </main>

        <footer>
            <p>Pratique o Manejo Integrado de Pragas (MIP) para proteger a biodiversidade.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
